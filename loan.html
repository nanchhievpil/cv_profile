<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f6fb;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.form{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.form label{
    font-weight:bold;
    display:block;
    margin-bottom:6px;
}

.form input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    background:#0d6efd;
    color:#fff;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0958d9;
}

.result{
    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.card{
    background:#eef5ff;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.card h3{
    color:#666;
    margin-bottom:10px;
}

.card p{
    font-size:24px;
    font-weight:bold;
    color:#0d6efd;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:25px;
}

table th{
    background:#0d6efd;
    color:white;
    padding:10px;
}

table td{
    padding:8px;
    border:1px solid #ddd;
    text-align:center;
}

tbody tr:nth-child(even){
    background:#f8f8f8;
}

@media(max-width:700px){
    .form,.result{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Loan Calculator</h1>

<div class="form">

<div>
<label>Principal ($)</label>
<input type="number" id="principal" value="3000">
</div>

<div>
<label>Monthly Interest (%)</label>
<input type="number" id="rate" value="0.9" step="0.01">
</div>

<div>
<label>Months</label>
<input type="number" id="months" value="12">
</div>

</div>

<button onclick="calculateLoan()">Calculate Loan</button>

<div class="result">

<div class="card">
<h3>Monthly Payment</h3>
<p id="monthly">$0</p>
</div>

<div class="card">
<h3>Total Interest</h3>
<p id="interest">$0</p>
</div>

<div class="card">
<h3>Total Payment</h3>
<p id="total">$0</p>
</div>

</div>

<table>
<thead>
<tr>
<th>Month</th>
<th>Payment</th>
<th>Principal</th>
<th>Interest</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="schedule"></tbody>

</table>

</div>

<script>

function calculateLoan(){

let principal = parseFloat(document.getElementById("principal").value);
let annualRate = parseFloat(document.getElementById("rate").value);
let months = parseInt(document.getElementById("months").value);

let r = annualRate / 100;

let payment =
(principal * r) /
(1 - Math.pow(1 + r, -months));

let balance = principal;

let totalInterest = 0;

let html = "";

for(let i=1;i<=months;i++){

let interest = balance * r;
let principalPaid = payment - interest;
balance -= principalPaid;

if(balance < 0) balance = 0;

totalInterest += interest;

html += `
<tr>
<td>${i}</td>
<td>$${payment.toFixed(2)}</td>
<td>$${principalPaid.toFixed(2)}</td>
<td>$${interest.toFixed(2)}</td>
<td>$${balance.toFixed(2)}</td>
</tr>
`;

}

document.getElementById("monthly").innerHTML =
"$" + payment.toFixed(2);

document.getElementById("interest").innerHTML =
"$" + totalInterest.toFixed(2);

document.getElementById("total").innerHTML =
"$" + (payment * months).toFixed(2);

document.getElementById("schedule").innerHTML = html;

}

calculateLoan();

</script>

</body>
</html>
