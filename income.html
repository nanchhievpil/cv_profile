<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income & Expense App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input,select{
    flex:1;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    padding:10px 20px;
    border:none;
    background:#2196f3;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1976d2;
}

.summary{
    display:flex;
    gap:20px;
    margin-top:20px;
}

.box{
    flex:1;
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.income{
    color:green;
}

.expense{
    color:red;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

.delete{
    background:red;
}
</style>
</head>
<body>

<div class="container">

<h1>Income & Expense App</h1>

<div class="card">
<div class="row">
<input type="date" id="date">

<select id="type">
<option value="Income">Income</option>
<option value="Expense">Expense</option>
</select>

<input type="text" id="description" placeholder="Description">

<input type="number" id="amount" placeholder="Amount">

<button onclick="addTransaction()">Save</button>
</div>
</div>

<div class="summary">
<div class="box">
<h3>Total Income</h3>
<h2 class="income" id="income">$0</h2>
</div>

<div class="box">
<h3>Total Expense</h3>
<h2 class="expense" id="expense">$0</h2>
</div>

<div class="box">
<h3>Balance</h3>
<h2 id="balance">$0</h2>
</div>
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Description</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

<script>
let transactions = [];

function addTransaction(){

let date = document.getElementById("date").value;
let type = document.getElementById("type").value;
let description = document.getElementById("description").value;
let amount = Number(document.getElementById("amount").value);

if(date=="" || description=="" || amount<=0){
    alert("Please fill all fields");
    return;
}

transactions.push({
    date,
    type,
    description,
    amount
});

showTransactions();
}

function showTransactions(){

let html = "";
let income = 0;
let expense = 0;

transactions.forEach((t,index)=>{

if(t.type==="Income"){
    income += t.amount;
}else{
    expense += t.amount;
}

html += `
<tr>
<td>${t.date}</td>
<td>${t.type}</td>
<td>${t.description}</td>
<td>$${t.amount}</td>
<td>
<button class="delete" onclick="deleteTransaction(${index})">
Delete
</button>
</td>
</tr>
`;
});

document.getElementById("list").innerHTML = html;

document.getElementById("income").innerHTML = "$"+income;
document.getElementById("expense").innerHTML = "$"+expense;
document.getElementById("balance").innerHTML = "$"+(income-expense);
}

function deleteTransaction(index){
transactions.splice(index,1);
showTransactions();
}
</script>

</body>
</html>
